apiVersion: apps/v1
kind: Deployment
metadata:
  name: civil-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: civil-web
  template:
    metadata:
      labels:
        app: civil-web
    spec:
      containers:
      - name: web
        image: ghcr.io/matucr/civil-engineer-web:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: civil-web-service
spec:
  selector:
    app: civil-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer

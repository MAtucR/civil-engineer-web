apiVersion: apps/v1
kind: Deployment
metadata:
  name: civil-engineer-web
  namespace: civil-web
  labels:
    app: civil-engineer-web
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: civil-engineer-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: civil-engineer-web
        version: "1.0.0"
    spec:
      containers:
        - name: civil-engineer-web
          image: ghcr.io/matucr/civil-engineer-web:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80
              name: http

          # ── Resource limits ───────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # ── Health probes ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          # ── Security ──────────────────────────────────────────────────────
          # nginx:alpine master process needs root to bind port 80.
          # Worker processes drop to the 'nginx' user (UID 101) automatically.
          # Use nginxinc/nginx-unprivileged if you need a fully rootless setup.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE", "CHOWN", "SETUID", "SETGID"]

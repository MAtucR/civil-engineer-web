apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: civil-engineer-web
  namespace: argocd
  labels:
    app: civil-engineer-web
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # ── Source ────────────────────────────────────────────────────────────────
  source:
    repoURL: https://github.com/MAtucR/civil-engineer-web.git
    targetRevision: main
    path: k8s

  # ── Destination: local k3s cluster ───────────────────────────────────────
  destination:
    server: https://kubernetes.default.svc
    namespace: civil-web

  # ── Sync policy: GitOps auto-sync ────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
